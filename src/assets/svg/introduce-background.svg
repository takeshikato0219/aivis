<svg width="440" height="956" viewBox="0 0 440 956"
     xmlns="http://www.w3.org/2000/svg">

    <defs>
        <!-- glow top-left -->
        <radialGradient id="glow1" cx="20%" cy="10%" r="70%">
            <stop offset="0%" stop-color="#00D8FF" stop-opacity="0.45"/>
            <stop offset="60%" stop-color="#00FF59" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#00FF59" stop-opacity="0"/>
        </radialGradient>

        <!-- glow bottom-right -->
        <radialGradient id="glow2" cx="80%" cy="95%" r="70%">
            <stop offset="0%" stop-color="#0050FF" stop-opacity="0.45"/>
            <stop offset="60%" stop-color="#00FFFF" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
        </radialGradient>

        <!-- soft blur -->
        <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80"/>
        </filter>

        <clipPath id="clip">
            <rect width="440" height="956"/>
        </clipPath>
    </defs>

    <g clip-path="url(#clip)">
        <!-- background -->

        <rect width="440" height="956" fill="#020205"/>

