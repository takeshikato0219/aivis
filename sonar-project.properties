# ============================================
# Project identification
# ============================================
sonar.projectKey=Timima01-app
sonar.projectName=Timima01App
sonar.projectVersion=1.0.0

# ============================================
# Source and test paths
# ============================================
sonar.sources=src
sonar.tests=__tests__

# ============================================
# Test inclusions
# ============================================
sonar.test.inclusions=__tests__/**/*.test.ts,__tests__/**/*.test.tsx

# ============================================
# Exclusions
# ============================================
sonar.exclusions=\
  **/*. test.ts,\
  **/*.test.tsx,\
  **/node_modules/**,\
  **/coverage/**,\
  **/*.styles.ts,\
  **/*.styles.tsx,\
  **/android/**,\
  **/ios/**,\
  **/__tests__/**,\
  **/index.ts,\
  **/index.tsx,\
  **/*.d.ts

# ============================================
# Coverage exclusions
# ============================================
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*. test.tsx,\
  **/*.styles.ts,\
  **/*. styles.tsx,\
  **/index.ts,\
  **/index.tsx,\
  **/*.d.ts,\
  **/__tests__/**,\
  **/types/**

# ============================================
# Coverage reports - FIXED
# ============================================
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ============================================
# Encoding
# ============================================
sonar.sourceEncoding=UTF-8

# ============================================
# Quality Gate
# ============================================
sonar.qualitygate.wait=true