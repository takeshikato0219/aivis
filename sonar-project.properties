# ============================================
# Project
# ============================================
sonar.projectKey=Timima01-app
sonar.projectName=Timima01App
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# ============================================
# Sources & Tests
# ============================================
sonar.sources=src
sonar.tests=__tests__

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# ============================================
# Coverage
# ============================================
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.d.ts,\
  **/*.styles.ts,\
  **/*.styles.tsx,\
  **/index.ts,\
  **/index.tsx,\
  **/__tests__/**,\
  **/*.styles.ts,\
  **/types/**,\
  **/constants/**,\
  src/components/**,\
  src/navigation/**,\
  src/screens/**,\
  src/providers/**

# ============================================
# Exclusions
# ============================================
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  android/**,\
  ios/**

sonar.cpd.exclusions=\
  **/*.styles.ts,\
  **/*.styles.tsx,\
  src/screens/**,\
  src/components/**

# ============================================
# Quality Gate (CI waits)
# ============================================
sonar.qualitygate.wait=true