# ============================================
# GitLab CI/CD Pipeline for Timima01App
# ============================================

stages:
  - install
  - lint
  - test
  - sonarqube
  - build

# ============================================
# Variables
# ============================================
variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  NODE_VERSION: "20"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

# ============================================
# STAGE: INSTALL
# ============================================
install_dependencies:
  stage: install
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  before_script:
    - echo "Branch ${CI_COMMIT_REF_NAME}"
    - node --version
    - npm --version
  script:
    - echo "Installing dependencies..."
    - npm ci --prefer-offline --no-audit
    - echo "Dependencies installed"
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ============================================
# STAGE: LINT
# ============================================
lint:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - echo "Running ESLint..."
    - npm run lint
    - echo "Lint check passed"
  only:
    - main
    - develop
    - merge_requests
  allow_failure: false

type_check:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - echo "Running TypeScript check..."
    - npm run type-check
    - echo "Type check passed"
  only:
    - main
    - develop
    - merge_requests
  allow_failure: false

# ============================================
# STAGE:  TEST
# ============================================
test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  before_script:
    - echo "Branch ${CI_COMMIT_REF_NAME}"
    - npm run test:clear
  script:
    - echo "Running tests with coverage..."
    - npm run test:ci
    - echo "Tests passed"
  after_script:
    - echo "Coverage summary"
    - cat coverage/coverage-summary.json || true
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
    expire_in: 7 days
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  only:
    - main
    - develop
    - merge_requests
  allow_failure: false

# ============================================
# STAGE:  SONARQUBE
# ============================================
sonarqube:
  stage: sonarqube
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  dependencies:
    - test
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: sonarqube-cache
    paths:
      - .sonar/cache
  before_script:
    - echo "Project ${CI_PROJECT_NAME}"
    - echo "Branch ${CI_COMMIT_REF_NAME}"
  script:
    - echo "Running SonarQube analysis..."
    - |
      if [ "${CI_COMMIT_REF_NAME}" = "main" ]; then
        sonar-scanner \
          -Dsonar.projectKey=${CI_PROJECT_NAME} \
          -Dsonar.sources=src \
          -Dsonar.tests=__tests__ \
          -Dsonar.host.url=${SONAR_HOST_URL} \
          -Dsonar.login=${SONAR_TOKEN} \
          -Dsonar.projectVersion=${CI_COMMIT_SHORT_SHA} \
          -Dsonar.scm.revision=${CI_COMMIT_SHA} \
          -Dsonar.branch.name=${CI_COMMIT_REF_NAME}
      else
        sonar-scanner \
          -Dsonar.projectKey=${CI_PROJECT_NAME} \
          -Dsonar.sources=src \
          -Dsonar.tests=__tests__ \
          -Dsonar.host.url=${SONAR_HOST_URL} \
          -Dsonar.login=${SONAR_TOKEN} \
          -Dsonar.projectVersion=${CI_COMMIT_SHORT_SHA} \
          -Dsonar.scm.revision=${CI_COMMIT_SHA}
      fi
    - echo "SonarQube analysis completed"
  only:
    - main
    - develop
    - merge_requests
  allow_failure: true

sonarqube_quality_gate:
  stage: sonarqube
  image: curlimages/curl:latest
  dependencies:
    - sonarqube
  needs:
    - sonarqube
  script:
    - echo "Checking Quality Gate..."
    - sleep 15
    - |
      STATUS=$(curl -s -u ${SONAR_TOKEN}: \
        "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${CI_PROJECT_NAME}" \
        | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
    - echo "Quality Gate Status ${STATUS}"
    - |
      if [ "${CI_COMMIT_REF_NAME}" = "main" ]; then
        if [ "${STATUS}" != "OK" ]; then
          echo "Quality Gate FAILED on main"
          exit 1
        fi
        echo "Quality Gate Passed"
      else
        echo "Quality Gate check completed"
      fi
  only:
    - main
    - develop
    - merge_requests
  allow_failure: true

# ============================================
# STAGE:  BUILD
# ============================================
build_android:
  stage: build
  image: reactnativecommunity/react-native-android:latest
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
    policy: pull
  dependencies:
    - install_dependencies
    - test
    - sonarqube_quality_gate
  before_script:
    - echo "Building Android..."
    - cd android
    - chmod +x gradlew
  script:
    - echo "Building APK..."
    - ./gradlew assembleRelease --no-daemon --stacktrace
    - echo "Build completed"
  after_script:
    - ls -lah android/app/build/outputs/apk/release/ || true
  artifacts:
    name: android-release-${CI_COMMIT_SHORT_SHA}
    paths:
      - android/app/build/outputs/apk/release/*. apk
    expire_in: 30 days
  only:
    - main
    - tags
  when: manual

build_ios:
  stage: build
  tags:
    - macos
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
    policy: pull
  dependencies:
    - install_dependencies
    - test
    - sonarqube_quality_gate
  before_script:
    - echo "Building iOS..."
    - cd ios
    - pod install
    - cd ..
  script:
    - echo "Building iOS archive..."
    - xcodebuild -workspace ios/Timima01App.xcworkspace -scheme Timima01App -configuration Release -sdk iphoneos -derivedDataPath ios/build -archivePath ios/build/Timima01App.xcarchive clean archive
    - echo "Build completed"
  after_script:
    - ls -lah ios/build/ || true
  artifacts:
    name: ios-release-${CI_COMMIT_SHORT_SHA}
    paths:
      - ios/build/Timima01App.xcarchive
    expire_in: 30 days
  only:
    - main
    - tags
  when: manual

# ============================================
# NOTIFICATIONS
# ============================================
notify_success:
  stage: .post
  image: curlimages/curl:latest
  script:
    - echo "Pipeline succeeded"
    - echo "Project ${CI_PROJECT_NAME}"
    - echo "Branch ${CI_COMMIT_REF_NAME}"
    - echo "Commit ${CI_COMMIT_SHORT_SHA}"
  when: on_success
  only:
    - main
    - develop

notify_failure:
  stage: .post
  image: curlimages/curl:latest
  script:
    - echo "Pipeline failed"
    - echo "Project ${CI_PROJECT_NAME}"
    - echo "Branch ${CI_COMMIT_REF_NAME}"
    - echo "Job ${CI_JOB_NAME}"
  when: on_failure
  only:
    - main
    - develop