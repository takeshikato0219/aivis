# ============================================
# GitLab CI/CD Pipeline for Timima01App
# Stages: install, lint, test, sonarqube, quality_gate
# ============================================

stages:
  - install
  - lint
  - test
  - sonarqube
  - quality_gate

# ============================================
# Variables
# ============================================
variables:
  SONAR_USER_HOME:  "${CI_PROJECT_DIR}/. sonar"
  GIT_DEPTH: "0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

# ============================================
# STAGE: INSTALL
# ============================================
install_dependencies:
  stage: install
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  before_script:
    - echo "Node $(node --version)"
    - echo "NPM $(npm --version)"
  script:
    - echo "📦 Installing dependencies..."
    - npm ci --prefer-offline --no-audit
    - echo "✅ Dependencies installed"
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests
  retry:
    max: 2
    when:
      - runner_system_failure

# ============================================
# STAGE: LINT
# ============================================
lint:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - echo "🔍 Running ESLint..."
    - npm run lint
    - echo "✅ Lint passed"
  only:
    - main
    - develop
    - merge_requests

type_check:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - echo "🔷 Running TypeScript check..."
    - npm run type-check
    - echo "✅ Type check passed"
  only:
    - main
    - develop
    - merge_requests

# ============================================
# STAGE:  TEST
# ============================================
test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  before_script:
    - echo "🧪 Preparing tests..."
    - npm run test:clear || true
  script:
    - echo "🧪 Running tests with coverage..."
    - npm run test:ci
    - echo "✅ Tests passed"
  after_script:
    - echo "📊 Verifying artifacts..."
    - test -f junit.xml && echo "✓ junit.xml exists" || echo "✗ junit.xml missing"
    - test -f coverage/lcov.info && echo "✓ lcov.info exists" || echo "✗ lcov.info missing"
  artifacts:
    when: always
    paths:
      - coverage/
      - junit. xml
    reports:
      junit: junit.xml
    expire_in: 7 days
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  only:
    - main
    - develop
    - merge_requests

# ============================================
# STAGE: SONARQUBE
# ============================================
sonarqube:
  stage: sonarqube
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  dependencies:
    - test
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: sonarqube-cache
    paths:
      - .sonar/cache
  before_script:
    - echo "📊 Preparing SonarQube analysis..."
    - echo "Project:  ${CI_PROJECT_NAME}"
    - echo "Branch: ${CI_COMMIT_REF_NAME}"
    - echo "Commit: ${CI_COMMIT_SHORT_SHA}"
    - ls -la coverage/ || echo "⚠️ No coverage directory"
    - test -f coverage/lcov.info && echo "✓ Coverage report found" || echo "⚠️ No coverage report"
  script:
    - echo "📊 Running SonarQube analysis..."
    - |
      sonar-scanner \
        -Dsonar.projectKey=${CI_PROJECT_NAME} \
        -Dsonar.projectName=${CI_PROJECT_NAME} \
        -Dsonar.sources=src \
        -Dsonar.tests=__tests__ \
        -Dsonar.host.url=${SONAR_HOST_URL} \
        -Dsonar.token=${SONAR_TOKEN} \
        -Dsonar.projectVersion=${CI_COMMIT_SHORT_SHA} \
        -Dsonar.scm.revision=${CI_COMMIT_SHA} \
        -Dsonar.typescript.lcov.reportPaths=coverage/lcov. info \
        -Dsonar.javascript.lcov.reportPaths=coverage/lcov. info \
        -Dsonar.sourceEncoding=UTF-8
    - echo "✅ SonarQube analysis completed"
  only:
    - main
    - develop
    - merge_requests
  allow_failure: true

# ============================================
# STAGE: QUALITY GATE
# ============================================
sonarqube_quality_gate:
  stage: quality_gate
  image: curlimages/curl:latest
  dependencies:
    - sonarqube
  needs:
    - sonarqube
  script:
    - |
      echo "Checking Quality Gate..."
      sleep 10

      STATUS=$(curl -s -u "${SONAR_TOKEN}:" \
        "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${CI_PROJECT_NAME}" \
        | grep -o '"status":"[^"]*"' | cut -d'"' -f4)

      echo "Quality Gate Status: $STATUS"

      if [ "$STATUS" != "OK" ]; then
        echo "❌ Quality Gate FAILED"
        exit 1
      fi

      echo "✔ Quality Gate PASSED"
  only:
    - main
    - develop
    - merge_requests

# ============================================
# NOTIFICATIONS
# ============================================
notify_success:
  stage: .post
  image: curlimages/curl:latest
  script:
    - echo "✅ Pipeline succeeded!"
    - echo "Project: ${CI_PROJECT_NAME}"
    - echo "Branch: ${CI_COMMIT_REF_NAME}"
    - echo "Commit: ${CI_COMMIT_SHORT_SHA}"
  when: on_success
  only:
    - main
    - develop

notify_failure:
  stage:  .post
  image: curlimages/curl:latest
  script:
    - echo "❌ Pipeline failed!"
    - echo "Project: ${CI_PROJECT_NAME}"
    - echo "Branch: ${CI_COMMIT_REF_NAME}"
    - echo "Failed Job: ${CI_JOB_NAME}"
    - echo "Pipeline:  ${CI_PIPELINE_URL}"
  when: on_failure
  only:
    - main
    - develop