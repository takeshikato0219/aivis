# ============================================
# GitLab CI/CD Pipeline for Timima01App (Check Only)
# ============================================

stages:
  - install
  - lint
  - test
  - sonarqube
  - quality_gate

# ============================================
# Variables
# ============================================
variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  NODE_VERSION: "20"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

# ============================================
# INSTALL
# ============================================
install_dependencies:
  stage: install
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  script:
    - echo "Installing dependencies..."
    - npm ci --prefer-offline --no-audit
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests

# ============================================
# LINT
# ============================================
lint:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - echo "Running ESLint..."
    - npm run lint
  only:
    - main
    - develop
    - merge_requests

type_check:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - echo "Running TypeScript..."
    - npm run type-check
  only:
    - main
    - develop
    - merge_requests

# ============================================
# TEST
# ============================================
test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - npm run test:clear
    - echo "Running tests..."
    - npm run test:ci
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
    expire_in: 7 days
  only:
    - main
    - develop
    - merge_requests

# ============================================
# SONARQUBE
# ============================================
sonarqube:
  stage: sonarqube
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  dependencies:
    - test
  cache:
    key: sonarqube-cache
    paths:
      - .sonar/cache
  script: |
    echo "Running SonarQube analysis..."

    sonar-scanner \
      -Dsonar.projectKey=${CI_PROJECT_NAME} \
      -Dsonar.sources=src \
      -Dsonar.tests=__tests__ \
      -Dsonar.host.url=${SONAR_HOST_URL} \
      -Dsonar.login=${SONAR_TOKEN} \
      -Dsonar.projectVersion=${CI_COMMIT_SHORT_SHA} \
      -Dsonar.scm.revision=${CI_COMMIT_SHA}
  only:
    - main
    - develop
    - merge_requests
  allow_failure: true

# ============================================
# QUALITY GATE
# ============================================
sonarqube_quality_gate:
  stage: quality_gate
  image: curlimages/curl:latest
  dependencies:
    - sonarqube
  needs:
    - sonarqube
  script:
    - echo "Waiting for SonarQube analysis..."
    - sleep 10
    - |
      STATUS=$(curl -s -u ${SONAR_TOKEN}: \
      "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${CI_PROJECT_NAME}" \
      | grep -o '"status":"[^"]*"' | cut -d'"' -f4)

    - echo "Quality Gate Status: ${STATUS}"

    - |
      if [ "${STATUS}" != "OK" ]; then
        echo "❌ Quality Gate FAILED"
        exit 1
      fi

    - echo "✔ Quality Gate PASSED"
  only:
    - main
    - develop
    - merge_requests
