# ============================================
# GitLab CI/CD - Timima01App
# ============================================

stages:
  - install
  - lint
  - test
  - sonarqube
  - quality_gate

# ============================================
# VARIABLES
# ============================================
variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  SONAR_PROJECT_KEY: "Timima01App"

# ============================================
# INSTALL
# ============================================
install_dependencies:
  stage: install
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  before_script:
    - echo "Node version: $(node --version)"
    - echo "NPM version: $(npm --version)"
  script:
    - npm ci --prefer-offline --no-audit
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests

# ============================================
# LINT
# ============================================
lint:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - npm run lint
  only:
    - main
    - develop
    - merge_requests

type_check:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - npm run type-check
  only:
    - main
    - develop
    - merge_requests

# ============================================
# TEST
# ============================================
test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
  dependencies:
    - install_dependencies
  before_script:
    - npm run test:clear || true
  script:
    - npm run test:ci
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
    expire_in: 7 days
  only:
    - main
    - develop
    - merge_requests

# ============================================
# SONARQUBE
# ============================================
sonarqube:
  stage: sonarqube
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  dependencies:
    - test
  cache:
    key: sonarqube-cache
    paths:
      - .sonar/cache
  before_script:
    - echo "Running SonarQube Scanner..."
    - echo "Project Key: ${SONAR_PROJECT_KEY}"
    - echo "Coverage lcov: coverage/lcov.info"
  script:
    - sonar-scanner \
      -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
      -Dsonar.sources=src \
      -Dsonar.tests=__tests__ \
      -Dsonar.host.url=${SONAR_HOST_URL} \
      -Dsonar.token=${SONAR_TOKEN} \
      -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info \
      -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
      -Dsonar.testExecutionReportPaths=junit.xml \
      -Dsonar.sourceEncoding=UTF-8
  only:
    - main
    - develop
    - merge_requests
  allow_failure: true

# ============================================
# QUALITY GATE
# ============================================
sonarqube_quality_gate:
  stage: quality_gate
  image: curlimages/curl:latest
  dependencies:
    - sonarqube
  needs:
    - sonarqube
  script:
    - echo "Checking Quality Gate..."
    - sleep 10
    - |
      STATUS=$(curl -s -u "${SONAR_TOKEN}:" \
        "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}" \
        | grep -o '"status":"[^"]*"' | cut -d'"' -f4)

      echo "Quality Gate Status: $STATUS"

      if [ "$STATUS" != "OK" ]; then
        echo "❌ Quality Gate FAILED"
        exit 1
      fi

      echo "✔ Quality Gate PASSED"
  only:
    - main
    - develop
    - merge_requests

