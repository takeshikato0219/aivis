# ============================================
# GitLab CI/CD - Timima01App (FINAL)
# ============================================

stages:
  - install
  - lint
  - test
  - sonarqube
  - quality_gate

variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  SONAR_PROJECT_KEY: "Timima01-app"

# ============================================
# INSTALL
# ============================================
install_dependencies:
  stage: install
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  script:
    - npm ci --prefer-offline --no-audit
  artifacts:
    paths:
      - node_modules/
    expire_in: 1h
  only:
    - main
    - develop
    - merge_requests

# ============================================
# LINT
# ============================================
lint:
  stage: lint
  image: node:20
  dependencies:
    - install_dependencies
  script:
    - npm run lint
  only:
    - main
    - develop
    - merge_requests

type_check:
  stage: lint
  image: node:20
  dependencies:
    - install_dependencies
  script:
    - npm run type-check
  only:
    - main
    - develop
    - merge_requests

# ============================================
# TEST
# ============================================
test:
  stage: test
  image: node:20
  dependencies:
    - install_dependencies
  before_script:
    - npm run test:clear || true
  script:
    - npm run test:ci
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
    expire_in: 7d
  only:
    - main
    - develop
    - merge_requests

# ============================================
# SONARQUBE
# ============================================
sonarqube:
  stage: sonarqube
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  dependencies:
    - test
  cache:
    key: sonar-cache
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  only:
    - main
    - develop
    - merge_requests

# ============================================
# QUALITY GATE
# ============================================
sonarqube_quality_gate:
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  allow_failure: true
  only:
    - main
