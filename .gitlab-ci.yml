# ============================================
# GitLab CI/CD - Timima01App (Fixed)
# ============================================

stages:
  - install
  - lint
  - test
  - sonarqube
  - quality_gate

variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  SONAR_PROJECT_KEY: "Timima01App"

# ============================================
# INSTALL
# ============================================
install_dependencies:
  stage: install
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  script:
    - echo "Installing dependencies..."
    - npm ci --prefer-offline --no-audit
  artifacts:
    paths:
      - node_modules/
    expire_in: 1h
  only:
    - main
    - develop
    - merge_requests

# ============================================
# LINT
# ============================================
lint:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - echo "Running ESLint..."
    - npm run lint
  only:
    - main
    - develop
    - merge_requests

type_check:
  stage: lint
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  script:
    - echo "Running TypeScript..."
    - npm run type-check
  only:
    - main
    - develop
    - merge_requests

# ============================================
# TEST
# ============================================
test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
    policy: pull
  dependencies:
    - install_dependencies
  before_script:
    - npm run test:clear || true
  script:
    - echo "Running tests..."
    - npm run test:ci
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
    expire_in: 7d
  only:
    - main
    - develop
    - merge_requests

# ============================================
# SONARQUBE
# ============================================
sonarqube:
  stage: sonarqube
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  dependencies:
    - test
  cache:
    key: sonarqube-cache
    paths:
      - .sonar/cache
  script:
    - echo "Running SonarQube analysis..."

    - |
      sonar-scanner \
        -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
        -Dsonar.sources=src \
        -Dsonar.tests=__tests__ \
        -Dsonar.host.url=${SONAR_HOST_URL} \
        -Dsonar.login=${SONAR_TOKEN} \
        -Dsonar.projectVersion=${CI_COMMIT_SHORT_SHA} \
        -Dsonar.scm.revision=${CI_COMMIT_SHA} \
        -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info \
        -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
  only:
    - main
    - develop
    - merge_requests

# ============================================
# QUALITY GATE
# ============================================
quality_gate:
  stage: quality_gate
  image: curlimages/curl:latest
  script:
    - echo "Checking Quality Gate..."
    - sleep 10
    - >
      STATUS=$(curl -s -u "${SONAR_TOKEN}:" 
      "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}")
    - echo "Response: $STATUS"
    - |
      if echo "$STATUS" | grep -q '"status":"ERROR"'; then
        echo "❌ Quality Gate FAILED"
        exit 1
      else
        echo "✔️ Quality Gate PASSED"
      fi
  allow_failure: false
  dependencies: []
  needs: ["sonarqube"]


